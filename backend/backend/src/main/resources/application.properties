spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
server.port=9090

# ==================================================================================================== #
#                                   JWT AUTHENTICATION CONFIGURATION                                   #
# ==================================================================================================== #
# AUTHOR: Apetrei Ionut-Teodor

# WARNING: DO NOT USE THIS DEFAULT KEY IN PRODUCTION!
# This is for local development only. For production, it is mandatory that
# an environment variable named 'JWT_SECRET_KEY' is being used.
app.jwt.secret=${JWT_SECRET_KEY}

# Access Token expiration (Current: 24 Hours)
app.jwt.expiration-ms=86400000

# TODO: Implement Refresh Token logic with 30-day duration (2592000000).
# REFRESH TOKENS PERMIT SHORT-LIVED ACCESS TOKENS, MINIMIZING
# THE SECURITY WINDOW IF A JWT IS COMPROMISED WHILE MAINTAINING USER SESSIONS.
# MANDATORY: STORE REFRESH TOKENS IN DATABASE TO ALLOW REMOTE REVOCATION.

# TODO: Add app.jwt.refresh-expiration-ms=2592000000 (30 Days) here later.
# TODO: Reduce Access Token expiration to 15m - 1h once Refresh Token rotation is implemented.


# ==================================================================================================== #
#                                             GOOGLE OAUTH2                                            #
# ==================================================================================================== #
# AUTHOR: Apetrei Ionut-Teodor

# TODO: Replace with your actual Google Client ID from Google Cloud Console.
# STEPS TO GET THE ID:
# 1. Go to https://console.cloud.google.com/
# 2. Create a project and search for "APIs & Services" > "OAuth consent screen".
# 3. Configure the screen, then go to "Credentials" > "Create Credentials" > "OAuth client ID".
# 4. Select "Web application", add your URIs (e.g., http://localhost:8080), and copy the Client ID.
app.google.client-id=${GOOGLE_CLIENT_ID}
# ==================================================================================================== #
#                                         DATABASE CONFIGURATION                                       #
# ==================================================================================================== #
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

app.ai.base-url=${AI_API_URL}