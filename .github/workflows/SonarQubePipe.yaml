name: Spring Boot SonarQube Analysis & AWS Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Permite declanșarea manuală din GitHub Actions
  repository_dispatch:
    types: [ec2_instance_ready]

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Dezactivează shallow clones pentru o raportare mai bună în SonarQube
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven # (Opțional, dar recomandat) Adaugă caching pentru a grăbi build-ul

      - name: Build and SonarQube Scan
        # Folosim comanda de Maven din pipeline-ul tău original de Spring
        run: mvn clean verify sonar:sonar -Dsonar.organization=fii-a5-ip -Dsonar.projectKey=fii-a5-ip_socially-backend -Dsonar.scanner.skipJreProvisioning=true
        working-directory: backend/backend # Ne asigurăm că rulăm mvn în folderul corect
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-deploy:
    needs: build-and-analyze # Așteaptă ca Job-ul de analiză să treacă
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'repository_dispatch' || github.event_name == 'workflow_dispatch' 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend-core 
          IMAGE_TAG: latest
        working-directory: backend/backend 
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name java-auto-scaling \
            --region eu-west-1 \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}'
