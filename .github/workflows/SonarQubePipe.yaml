name: Spring Boot SonarQube Analysis & AWS Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: # Permite declanșarea manuală din GitHub Actions

jobs:
  build-and-analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Dezactivează shallow clones pentru o raportare mai bună în SonarQube
          fetch-depth: 0 

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven # (Opțional, dar recomandat) Adaugă caching pentru a grăbi build-ul

      - name: Build and SonarQube Scan
        # Folosim comanda de Maven din pipeline-ul tău original de Spring
        run: mvn clean verify sonar:sonar -Dsonar.organization=fii-a5-ip -Dsonar.projectKey=fii-a5-ip_socially-backend
        working-directory: backend/backend # Ne asigurăm că rulăm mvn în folderul corect
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  build-and-deploy:
    needs: build-and-analyze # Așteaptă ca Job-ul de analiză să treacă
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' 
    # Deploy se face DOAR pe push în main

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: backend-core 
          IMAGE_TAG: latest
        working-directory: backend/backend 
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user 
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_URL,DB_USER,DB_PASS,GOOGLE_CLIENT_ID,JWT_SECRET_KEY
          script: |
            # 1. Autentificare ECR pe serverul EC2
            aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            
            # 2. Tragerea celei mai noi imagini
            docker pull ${{ steps.login-ecr.outputs.registry }}/backend-core:latest
            
            # 3. Oprirea și ștergerea containerului vechi
            docker stop spring-backend-app || true
            docker rm spring-backend-app || true
            
            # 4. Pornirea noului container
            docker run -d --name spring-backend-app -p 9090:9090 \
              -e DB_URL="$DB_URL" \
              -e DB_USER="$DB_USER" \
              -e DB_PASS="$DB_PASS" \
              -e GOOGLE_CLIENT_ID="$GOOGLE_CLIENT_ID" \
              -e JWT_SECRET_KEY="$JWT_SECRET_KEY" \
              ${{ steps.login-ecr.outputs.registry }}/backend-core:latest
